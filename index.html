<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-card">
            <h1>My to-do list</h1>
            <p class="instruction">Double-click an item to mark it complete.</p>
            
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="Ketik kegiatan di sini...">
                <button id="add-button">Add</button>
            </div>

            <ol id="todo-list">
                <!-- Daftar kegiatan akan muncul di sini -->
            </ol>

            <div class="action-buttons">
                <button id="clear-completed" class="btn-blue">Clear Completed</button>
                <button id="empty-list" class="btn-red">Empty List</button>
                <button id="save-list" class="btn-green">Save List</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
